name: Fetch Daily Data

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Daily Data
        env:
          YT_KEY:  ${{ secrets.YOUTUBE_API_KEY }}
          YT_KEY2: ${{ secrets.YOUTUBE_API_KEY2 }}
        run: python3 fetch_daily_script.py

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add weekly_videos.json creator_videos.json
          git diff --staged --quiet || git commit -m "Daily update: $(date -u '+%Y-%m-%d %H:%M')"
          git push

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload latest weekly_videos.json creator_videos.json --clobber 2>/dev/null || true
