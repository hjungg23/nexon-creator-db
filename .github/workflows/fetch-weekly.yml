name: Fetch Weekly Data

on:
  schedule:
    - cron: '0 15 * * 0'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Channel Stats
        env:
          YT_KEY2: ${{ secrets.YOUTUBE_API_KEY2 }}
          TW_ID:  ${{ secrets.TWITCH_CLIENT_ID }}
          TW_SEC: ${{ secrets.TWITCH_CLIENT_SECRET }}
        run: python3 fetch_weekly_script.py

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add channel_stats.json
          git diff --staged --quiet || git commit -m "Weekly stats update: $(date -u '+%Y-%m-%d %H:%M')"
          git push

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload latest channel_stats.json --clobber 2>/dev/null || true
